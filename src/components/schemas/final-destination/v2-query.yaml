type: object
additionalProperties: false
properties:
  address_string:
    type: string
  address_structured:
    $ref: "./../general/structured-address.yaml"
  location:
    $ref: "./v2-location.yaml"
  id:
    type: string
    format: uuid
  country:
    $ref: ./../general/country.yaml
  source_id:
    $ref: "./v2-source-search.yaml"
  additional_matches:
    type: boolean
    default: false
  language:
    $ref: "./../general/language.yaml"
description: |
  A single search query. It can be used to either lookup a door and parking spot by:
  - Address
  - Location
  - Naurt ID
  - Source Address ID (E.g, OS UPRN)
