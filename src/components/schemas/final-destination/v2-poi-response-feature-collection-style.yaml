type: object
title: Feature Collection Style
additionalProperties: false
required:
  - id
  - address
  - geojson
properties:
  id:
    type: string
    format: uuid
  address:
    type: string
  geojson:
    $ref: "./../general/geojson/feature-collection.yaml"
  distance:
    type: number
  search_confidence:
    type: number
    format: double
    minimum: 0.0
    maximum: 1.0
  structured_response:
    $ref: "./../general/structured-address.yaml"
  source_id:
    $ref: "./v2-source-id-response.yaml"
