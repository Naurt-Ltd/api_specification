type: object
additionalProperties: false
required: [latitude, longitude]
properties:
  latitude:
    type: number
    minimum: -90
    maximum: 90
  longitude:
    type: number
    minimum: -180
    exclusiveMaximum: 180
  distance_filter:
    type: number
    exclusiveMinimum: 0
    maximum: 25000
    default: 5000
