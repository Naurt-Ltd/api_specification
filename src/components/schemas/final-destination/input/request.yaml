description: |
  A single request to the API, which can contain up to 200 queries. Each query 
  is independent and can be of a different type.
type: object
additionalProperties: false
required:
  - queries
properties:
  queries:
    type: array
    minItems: 1
    maxItems: 200
    items:
      $ref: "./query.yaml"
  options:
    $ref: "./options.yaml"
