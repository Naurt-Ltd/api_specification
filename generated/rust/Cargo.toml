[package]
name = "naurt-api"
version = "0.1.0"
authors = [
    "Indigo Curnick <indigo.c@naurt.com>",
    "Andrew Bowell <andrew.b@naurt.com>",
]
description = "OpenAPI specification for Naurt's APIs. "
readme = "README.md"
license = "MIT"
edition = "2024"
homepage = "https://naurt.com"
repository = "https://github.com/Naurt-Ltd/api_specification"
categories = ["api-bindings"]
keywords = ["naurt", "geocoding", "api"]

include = [
  "src/**",
  "Cargo.toml",
  "README.md",
  "examples/**",
  "docs/**"
]

[dependencies]
serde = { version = "^1.0", features = ["derive"] }
serde_with = { version = "^3.8", default-features = false, features = ["base64", "std", "macros"] }
serde_json = "^1.0"
serde_repr = "^0.1"
url = "^2.5"
uuid = { version = "^1.8", features = ["serde", "v4"] }
reqwest = { version = "^0.13", default-features = false, features = ["json", "multipart", "query", "form"] }

[dev-dependencies]
tokio = {version = "^1.5", features=["full"]}

[features]
default = ["native-tls"]
native-tls = ["reqwest/native-tls"]
rustls = ["reqwest/rustls"]
