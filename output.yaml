openapi: 3.1.1
info:
  title: Naurt API
  version: 0.1.1
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  description: |
    OpenAPI specification for Naurt's APIs.
servers:
  - url: https://api.naurt.net
security:
  - ApiKeyAuth: []
tags:
  - name: Final Destination
  - name: Meta
paths:
  /final-destination/v2:
    options:
      tags:
        - Final Destination
      operationId: finaldestination-options
      summary: Options
      responses:
        '200':
          description: Endpoint metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/options-response'
    post:
      tags:
        - Final Destination
      operationId: finaldestination-post
      summary: Post
      description: |
        Query the Naurt Final Destination dataset to retrieve precise destination
        locations for addresses, buildings, entrances, and parking locations.

        Each request contains one or more `queries`. A query can represent several
        different search types supported by the Final Destination API:

        • Forward geocoding — supply an `address_string` or `address_structured`  
        • Reverse geocoding — supply a `location` with latitude and longitude  
        • Naurt ID lookup — supply an `id` returned from a previous query  
        • Source ID lookup — supply identifiers such as `os_uprn`  

        The API returns a best match for each query along with optional additional
        matches. Results may include multiple destination geometries such as building
        entrances, delivery doors, or parking locations depending on available data.

        The geometry format returned by the API is controlled by `options.geojson_type`:

        • `geojson` (default) — results are returned as standard GeoJSON
          FeatureCollections with geometries and properties.

        • `key_value` — results are returned as a simplified key/value representation
          where each destination type contains latitude and longitude coordinates.

        Each query result includes a status, the best match, optional additional
        matches, and metadata such as distance from the search location when
        applicable.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/final-destination-request'
            examples:
              forward_geocode:
                value:
                  queries:
                    - address_string: 32 Thames St, Windsor SL4 1PS
                      country: GB
              reverse_geocode:
                value:
                  queries:
                    - location:
                        latitude: 50.542
                        longitude: 0.234
                        distance_filter: 5000
              structured_geocode:
                value:
                  queries:
                    - address_structured:
                        street_number: '25'
                        street_name: Lower Way
                        city: Thatcham
                        postalcode: RG19 3RR
                      country: GB
                  options:
                    structured_response: true
              id_lookup:
                value:
                  queries:
                    - id: c56dbebb-c7ab-ede2-a7ac-f84e57d1878d
              source_id_lookup:
                value:
                  queries:
                    - source_id:
                        os_uprn: '200001191298'
                  options:
                    source_id:
                      os_uprn: true
              key_value_response:
                value:
                  queries:
                    - address_string: 32 Thames St, Windsor SL4 1PS
                  options:
                    geojson_type: key_value
      responses:
        '200':
          description: Successful lookup
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/final-destination-response'
              examples:
                feature_collection:
                  value:
                    request_id: 96becf25-e233-4f9c-a05c-4bed90190bdd
                    version: v2
                    responses:
                      - status: ok
                        best_match:
                          id: c56dbebb-c7ab-ede2-a7ac-f84e57d1878d
                          address: 11600 NW 14th St, Hollywood, FL 33026-2568, United States
                          geojson:
                            type: FeatureCollection
                            features:
                              - type: Feature
                                geometry:
                                  type: Point
                                  coordinates:
                                    - -80.305321
                                    - 26.019775
                                properties:
                                  naurt_type: basic_geocode
                        additional_matches: []
                key_value:
                  value:
                    request_id: 96becf25-e233-4f9c-a05c-4bed90190bdd
                    version: v2
                    responses:
                      - status: ok
                        best_match:
                          id: c56dbebb-c7ab-ede2-a7ac-f84e57d1878d
                          address: 11600 NW 14th St, Hollywood, FL 33026-2568, United States
                          geojson:
                            basic_geocode:
                              latitude: 26.019775
                              longitude: -80.305321
                        additional_matches: []
        4XX:
          description: Bad request or validation errors
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'
        5XX:
          description: Internal server errors
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'
  /rendezvous/v1:
    options:
      tags:
        - Rendezvous
      summary: Options
      description: |
        Returns the current API version and any deprecated versions.
      operationId: rendezvous-options
      responses:
        '200':
          description: Endpoint metadata
          headers:
            allow:
              description: Allowed request methods
              schema:
                type: string
                example: POST
            Content-Type:
              description: Response content type
              schema:
                type: string
                example: application/json
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/options-response'
    post:
      tags:
        - Rendezvous
      summary: Post
      description: |
        Rendezvous takes a list of queries, finds delivery clusters, and returns
        cluster centres plus the covered addresses for each cluster.

        This is not a routing tool. It does not provide delivery order or route
        optimisation.
      operationId: rendezvous-post
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/rendezvous-request'
            examples:
              address_batch:
                summary: Example address batch
                value:
                  queries:
                    - address_string: 18a, Montague Place, Brighton, BN2 1JE, United Kingdom
                    - address_string: Flat 9, Montague Court, Montague Street, Brighton, BN2 1NQ, United Kingdom
                    - address_string: 28 Hereford Street, Brighton, BN2 1JT, United Kingdom
                    - address_string: 4378twbv5934wy 9q87v3ncyq9nv eriyuib4478twtvwbeihsecfonreniren vt9nhyutrevuhtvnuhitr
                    - address_string: 27 Hereford Street, Brighton, BN2 1JT, United Kingdom
                    - address_string: 28 Essex Street, Brighton, BN2 1JW, United Kingdom
                    - address_string: Flat 31, Martlet Court, Hereford Street, Brighton, BN2 1LQ, United Kingdom
      responses:
        '200':
          description: Successful clustering response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/rendezvous-response'
        '400':
          description: Bad request
        '401':
          description: Missing or invalid API key
        '500':
          description: Internal server error
  /feedback/v2:
    options:
      tags:
        - Feedback
      operationId: feedback-options
      summary: Options
      responses:
        '200':
          description: Endpoint metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/options-response'
    post:
      tags:
        - Feedback
      summary: Post
      description: |
        Submit feedback to Naurt for address, parking location, or door location data.

        This endpoint can be used to:
        - suggest corrections to existing Naurt address data
        - suggest improved parking locations
        - suggest improved door locations
        - provide new address records where parking or door data is not yet available

        A valid API key is required. Feedback submissions do not count against API usage.
      operationId: feedback-post
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/feedback-request'
            examples:
              address_with_door:
                summary: New address with door location
                value:
                  queries:
                    - address_string: Flat A, 49 Upper Tulse Hill, London, SW2 2SQ
                      door_location:
                        latitude: 51.448
                        longitude: -0.119
              mixed_batch:
                summary: Mixed address and ID feedback
                value:
                  queries:
                    - address_string: Flat A, 49 Upper Tulse Hill, London, SW2 2SQ
                      door_location:
                        latitude: 51.448
                        longitude: -0.119
                      parking_location:
                        latitude: 51.45
                        longitude: -0.12
                    - id: 198a66f9-68f4-3f60-8d12-4c7ca4100efc
                      parking_location:
                        latitude: 51.45
                        longitude: -0.12
      responses:
        '200':
          description: Feedback accepted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/feedback-response'
              example:
                success: true
        '400':
          description: Bad request
        '401':
          description: Missing or invalid API key
        '500':
          description: Internal server error
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: Authorization
      description: |
        Authenticate using your Naurt API key.

        Send the raw API key in the `Authorization` header.
        Do not prefix it with `Bearer`.

        Example:
        `Authorization: nk_your_api_key_here`
  schemas:
    country:
      description: |
        An enum representing all possible countries that Naurt currently supports
      type: string
      enum:
        - AE
        - AU
        - AT
        - BE
        - BH
        - BR
        - CA
        - CH
        - CZ
        - DE
        - EG
        - ES
        - FI
        - FR
        - GB
        - GG
        - HK
        - IE
        - IM
        - IT
        - JE
        - JO
        - JP
        - KR
        - LU
        - NL
        - 'NO'
        - NZ
        - PL
        - PT
        - QA
        - SA
        - SE
        - SI
        - SG
        - TW
        - US
        - UK
        - ZA
    structured-address:
      description: |
        Naurt's own format for structured address data. Please see: 
        https://docs.naurt.com/reference/address-structure/ for significant more 
        details on this data format.

        When searching, do not use `country_code` - as it is not used. `country_code`
        is for responses only.
      type: object
      additionalProperties: false
      properties:
        unit:
          type: string
        house_name:
          type: string
        street_number:
          type: string
        street_name:
          type: string
        locality:
          type: string
        city:
          type: string
        county:
          type: string
        state:
          type: string
        country:
          type: string
        postalcode:
          type: string
        country_code:
          $ref: '#/components/schemas/country'
    final-destination-location:
      description: |
        A location, using WGS84 latitude and longitude.

        Used for a reverse geocode, or to add some location bias to a forward geocode.

        Use `distance_filter` to optionally limit the distance from this point that 
        results can appear within
      type: object
      additionalProperties: false
      required:
        - latitude
        - longitude
      properties:
        latitude:
          type: number
          minimum: -90
          maximum: 90
        longitude:
          type: number
          minimum: -180
          exclusiveMaximum: 180
        distance_filter:
          type: number
          exclusiveMinimum: 0
          maximum: 25000
          default: 5000
    final-destination-source-id-request:
      type: object
      additionalProperties: false
      properties:
        oneOf:
          os_uprn:
            type: boolean
          os_udprn:
            type: boolean
    language:
      description: |
        Used for reverse geocodes only, to decide which language the response is in. 
        In a forward geocode, the response language will match the input language.

        See: https://docs.naurt.com/reference/language/ for detailed information on 
        language availability for all countries (not all countries have alternative 
        languages)
      type: string
      enum:
        - Auto
        - EN
        - AR
        - JA
        - FR
        - DE
        - IT
        - PT
        - KO
        - ZH
        - NL
        - 'NO'
        - FI
        - PL
        - SL
        - CZ
      default: Auto
    final-destination-query:
      type: object
      additionalProperties: false
      properties:
        address_string:
          type: string
        address_structured:
          $ref: '#/components/schemas/structured-address'
        location:
          $ref: '#/components/schemas/final-destination-location'
        id:
          type: string
          format: uuid
        country:
          $ref: '#/components/schemas/country'
        source_id:
          $ref: '#/components/schemas/final-destination-source-id-request'
        additional_matches:
          type: boolean
          default: false
        language:
          $ref: '#/components/schemas/language'
      description: |
        A single search query. It can be used to lookup a door and parking spot by:
        - Forward geocode
        - Reverse geocode
        - Structured geocode
        - Naurt ID lookup
        - Source ID lookup
    geojson-type:
      description: |
        Use this to switch between a key-value style GeoJSON or a classic GeoJSON
      type: string
      enum:
        - geojson
        - key_value
      default: geojson
    input-filter:
      description: |
        Input filtering helps when you have addresses from sources you can't control.
        Sometimes, providers might miss out on important parts of addresses, like a
        street number or postcode. If Naurt detects that an address is missing too 
        many fields to be likely to give a good match, it can be rejected by this 
        feature

        `none` turns this feature off and does not do any input filtering. This may 
        result in some poor responses

        `loose` is the default - it does filter out some poor inputs but allows some 
        missing fields 

        `strict` is our strictest, and only allows searches which are likely to
        produce good matches
      type: string
      enum:
        - none
        - loose
        - strict
      default: loose
    final-destination-options:
      description: |
        `options` impact all `queries` within a request
      ype: object
      additionalProperties: false
      properties:
        pretty_print:
          type: boolean
          default: false
          description: |
            This will format the response in a more human readable way. Only
            recommended for debug, as it increases payload size
        verbose:
          type: boolean
          default: false
          description: |
            Returns additional debug information about request processing. Only 
            recommended for debug, as it increases payload size
        structured_response:
          type: boolean
          default: false
          description: |
            Adds the Naurt structured format of the address to the response
        geojson_type:
          $ref: '#/components/schemas/geojson-type'
        return_original:
          type: boolean
          default: false
          description: |
            Returns your original query back in the response
        input_filter:
          $ref: '#/components/schemas/input-filter'
    final-destination-request:
      description: |
        A single request to the API, which can contain up to 200 queries. Each query 
        is independent and can be of a different type.
      type: object
      additionalProperties: false
      required:
        - queries
      properties:
        queries:
          type: array
          minItems: 1
          maxItems: 200
          items:
            $ref: '#/components/schemas/final-destination-query'
        options:
          $ref: '#/components/schemas/final-destination-options'
    point:
      type: object
      required:
        - coordinates
        - type
      properties:
        coordinates:
          type: array
          minItems: 2
          maxItems: 2
          items:
            type: number
            format: double
        type:
          type: string
          enum:
            - Point
    multipoint:
      type: object
      properties:
        coordinates:
          type: array
          items:
            type: array
            minItems: 2
            maxItems: 2
            items:
              type: number
              format: double
        type:
          type: string
          enum:
            - MultiPoint
    polygon:
      type: object
      properties:
        coordinates:
          type: array
          items:
            type: array
            items:
              type: array
              minItems: 2
              maxItems: 2
              items:
                type: number
                format: double
        type:
          type: string
          enum:
            - Polygon
      required:
        - coordinates
        - type
    accuracy:
      type: object
      required:
        - quality
      properties:
        quality:
          type: string
          enum:
            - low
            - medium
            - high
    feature-properties:
      type: object
      required:
        - naurt_type
      properties:
        naurt_type:
          type: string
          enum:
            - basic_geocode
            - naurt_door
            - naurt_building
            - naurt_parking
        accuracy:
          $ref: '#/components/schemas/accuracy'
        minimum_parking_to_door_distance:
          type: number
          format: double
    feature:
      type: object
      required:
        - geometry
        - properties
        - type
      properties:
        geometry:
          oneOf:
            - $ref: '#/components/schemas/point'
            - $ref: '#/components/schemas/multipoint'
            - $ref: '#/components/schemas/polygon'
        properties:
          $ref: '#/components/schemas/feature-properties'
        type:
          type: string
          enum:
            - Feature
    feature-collection:
      type: object
      required:
        - features
        - type
      properties:
        features:
          type: array
          minItems: 1
          maxItems: 4
          items:
            $ref: '#/components/schemas/feature'
        type:
          type: string
          enum:
            - FeatureCollection
          default: FeatureCollection
    key-value:
      type: object
      required:
        - default_geocode
      properties:
        building:
          $ref: '#/components/schemas/polygon'
        default_geocode:
          $ref: '#/components/schemas/point'
        entrance:
          $ref: '#/components/schemas/multipoint'
        parking:
          $ref: '#/components/schemas/polygon'
    final-destination-search-confidence:
      description: |
        Confidence score in the range 0.0 to 1.0 indicating how well the result 
        matches the query. Higher is better.

        See: https://docs.naurt.com/reference/search-confidence

        Not to be confused with Accuracy, which is how good the data itself is. This 
        is about the likelihood of a good match.
      example: 0.93
      type: number
      format: double
      minimum: 0
      maximum: 1
    final-destination-source-id-response:
      description: |
        An object containing information on source IDs. Source IDs refer to underlying
        IDs from address data sets. Currently supporting UPRN and UDPRN in the UK 
        referring to the OrdnanceSurvey datasets
      example:
        UPRN:
          value:
            os_uprn: '100062664604'
        UDPRN:
          value:
            os_udprn: '25962203'
      type: object
      additionalProperties: false
      properties:
        os_uprn:
          type: string
        os_udprn:
          type: string
    final-destination-hit:
      type: object
      title: Final Destination Hit
      additionalProperties: false
      required:
        - id
        - address
        - geojson
      properties:
        id:
          type: string
          format: uuid
        address:
          type: string
        geojson:
          oneOf:
            - $ref: '#/components/schemas/feature-collection'
            - $ref: '#/components/schemas/key-value'
        distance:
          type: number
        search_confidence:
          $ref: '#/components/schemas/final-destination-search-confidence'
        structured_response:
          $ref: '#/components/schemas/structured-address'
        source_id:
          $ref: '#/components/schemas/final-destination-source-id-response'
    final-destination-status:
      description: |
        The `queries` and `responses` arrays are always 1:1. If no match can be found,
        a 404 will NOT be returned. Instead, check this enum for `no_matches`. That 
        indicates no error has happened, but nothing was found. `ok` when something is
        found.
      type: string
      enum:
        - ok
        - no_matches
    final-destination-hits:
      type: object
      additionalProperties: false
      required:
        - best_match
        - additional_matches
        - status
      properties:
        best_match:
          oneOf:
            - $ref: '#/components/schemas/final-destination-hit'
            - type: 'null'
        additional_matches:
          type: array
          items:
            $ref: '#/components/schemas/final-destination-hit'
        status:
          $ref: '#/components/schemas/final-destination-status'
        original_request:
          $ref: '#/components/schemas/final-destination-query'
    final-destination-logging:
      type: object
      additionalProperties: false
      properties:
        info:
          type: array
          items:
            type: string
        warnings:
          type: array
          items:
            type: string
        errors:
          type: array
          items:
            type: string
    final-destination-response:
      description: |
        A response from the API. The `responses` are in the same order as the original 
        `queries` from the request.
      type: object
      additionalProperties: false
      required:
        - responses
        - version
        - request_id
      properties:
        responses:
          type: array
          items:
            $ref: '#/components/schemas/final-destination-hits'
        logging:
          $ref: '#/components/schemas/final-destination-logging'
        version:
          type: string
        request_id:
          type: string
          format: uuid
    error-response:
      type: object
      description: |
        All Naurt errors come in this standard format. 

        `code` is a unique error code you can quote to support, should you need to

        `reason` explains why this error has been received

        `remediation` gives steps to help resolve this error
      additionalProperties: false
      required:
        - code
        - reason
        - remediation
      properties:
        code:
          type: string
        reason:
          type: string
        remediation:
          type: string
    options-response:
      type: object
      additionalProperties: false
      required:
        - current_version
        - deprecated_versions
      properties:
        current_version:
          type: string
        deprecated_versions:
          type: array
          items:
            type: string
    rendezvous-query:
      type: object
      description: |
        Shared Naurt Query object.

        The Rendezvous spec refers to the shared Search Query specification.
        At minimum, address-based queries such as `address_string` are supported.
        Other shared query forms may also be accepted.
      properties:
        address_string:
          type: string
          description: Free-form address query string
        latitude:
          type: number
        longitude:
          type: number
      additionalProperties: true
      example:
        address_string: 18a, Montague Place, Brighton, BN2 1JE, United Kingdom
    rendezvous-options:
      type: object
      description: Optional Rendezvous request options
      additionalProperties: true
    rendezvous-request:
      type: object
      required:
        - queries
      properties:
        queries:
          type: array
          maxItems: 200
          description: |
            List of Query objects. The Query object is shared across Naurt APIs.
            Different query types may be mixed in the same request.
          items:
            $ref: '#/components/schemas/rendezvous-query'
        options:
          $ref: '#/components/schemas/rendezvous-options'
      additionalProperties: false
    rendezvous-hit-data:
      type: object
      required:
        - id
        - address
        - geojson
      properties:
        id:
          type: string
        address:
          type: string
          description: Normalised address; may differ from the searched address
        geojson:
          $ref: '#/components/schemas/feature-collection'
        distance:
          type: number
          format: float
          description: |
            Distance in metres from the searched latitude/longitude.
            Present only when searching with latitude and longitude.
      additionalProperties: false
    rendezvous-hit:
      type: object
      required:
        - centre
        - covers
      properties:
        centre:
          $ref: '#/components/schemas/rendezvous-hit-data'
        covers:
          type: array
          items:
            $ref: '#/components/schemas/rendezvous-hit-data'
      additionalProperties: false
    rendezvous-response:
      type: object
      required:
        - responses
        - unmatched
      properties:
        responses:
          type: array
          items:
            $ref: '#/components/schemas/rendezvous-hit'
        unmatched:
          type: array
          description: Queries that could not be matched
          items:
            $ref: '#/components/schemas/rendezvous-query'
        version:
          type:
            - string
            - 'null'
          description: API version used to service the request
        request_id:
          type:
            - string
            - 'null'
          description: |
            Request identifier useful when reporting issues to Naurt.
            Mentioned in the prose docs, though not shown in the response shape block.
      additionalProperties: false
    feedback-location:
      type: object
      required:
        - latitude
        - longitude
      properties:
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
      additionalProperties: false
    feedback-query:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Existing Naurt ID for the address being updated
        address_string:
          type: string
          description: |
            Address text for a new feedback item. Address strings are not matched
            with current data, so existing addresses should use `id` instead.
        parking_location:
          $ref: '#/components/schemas/feedback-location'
        door_location:
          $ref: '#/components/schemas/feedback-location'
      additionalProperties: false
      allOf:
        - oneOf:
            - required:
                - id
            - required:
                - address_string
        - not:
            required:
              - id
              - address_string
        - anyOf:
            - required:
                - parking_location
            - required:
                - door_location
    feedback-request:
      type: object
      required:
        - queries
      properties:
